<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Main background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080d1a"/>
      <stop offset="100%" stop-color="#0d1628"/>
    </linearGradient>
    <!-- Gold gradient for text and accents -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fde68a"/>
      <stop offset="40%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c9922a"/>
    </linearGradient>
    <!-- Gold glow gradient for ring -->
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f0c040"/>
      <stop offset="100%" stop-color="#c9922a"/>
    </linearGradient>
    <!-- Subtle blue accent -->
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <!-- Purple accent -->
    <linearGradient id="purpleAccent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <!-- Radial glow for center -->
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f0c040" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#f0c040" stop-opacity="0"/>
    </radialGradient>
    <!-- Corner rounded rect clip -->
    <clipPath id="roundedClip">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Soft glow for text -->
    <filter id="textGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drop shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="12" flood-color="#f0c040" flood-opacity="0.3"/>
    </filter>
  </defs>

  <g clip-path="url(#roundedClip)">
    <!-- Background -->
    <rect width="1024" height="1024" fill="url(#bg)"/>
    
    <!-- Subtle grid pattern overlay -->
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="0.8"/>
    </pattern>
    <rect width="1024" height="1024" fill="url(#grid)"/>

    <!-- Top-right radial glow -->
    <circle cx="820" cy="180" r="320" fill="rgba(240,192,64,0.05)"/>
    <!-- Bottom-left radial glow -->
    <circle cx="200" cy="860" r="260" fill="rgba(168,85,247,0.06)"/>
    <!-- Center glow -->
    <circle cx="512" cy="512" r="380" fill="url(#centerGlow)"/>

    <!-- ─── OUTER DECORATIVE RING ─── -->
    <!-- Full ring base (very dim) -->
    <circle cx="512" cy="512" r="370" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>
    
    <!-- Animated arc segments (gold) -->
    <!-- Top arc segment -->
    <path d="M 512 142 A 370 370 0 0 1 844 668" fill="none" stroke="url(#goldRing)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
    <!-- Small dot markers on ring -->
    <circle cx="512" cy="142" r="6" fill="#f0c040" opacity="0.8"/>
    <circle cx="844" cy="668" r="6" fill="#f0c040" opacity="0.8"/>
    <circle cx="180" cy="668" r="6" fill="url(#purpleAccent)" opacity="0.7"/>
    <!-- Bottom-left arc (purple) -->
    <path d="M 180 668 A 370 370 0 0 1 512 142" fill="none" stroke="url(#purpleAccent)" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

    <!-- ─── INNER RING ─── -->
    <circle cx="512" cy="512" r="290" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1.5"/>
    <!-- Small accent dots on inner ring -->
    <circle cx="512" cy="222" r="4" fill="rgba(240,192,64,0.5)"/>
    <circle cx="802" cy="512" r="4" fill="rgba(96,165,250,0.5)"/>
    <circle cx="512" cy="802" r="4" fill="rgba(192,132,252,0.5)"/>
    <circle cx="222" cy="512" r="4" fill="rgba(240,192,64,0.3)"/>

    <!-- ─── BOOK / SCREEN ICON ─── -->
    <!-- Outer card shadow -->
    <rect x="268" y="278" width="488" height="400" rx="32" ry="32" fill="rgba(0,0,0,0.5)"/>
    <!-- Main card -->
    <rect x="262" y="272" width="488" height="400" rx="32" ry="32" fill="#111828"/>
    <!-- Card border -->
    <rect x="262" y="272" width="488" height="400" rx="32" ry="32" fill="none" stroke="rgba(240,192,64,0.2)" stroke-width="2"/>
    <!-- Card inner glow top -->
    <rect x="262" y="272" width="488" height="60" rx="32" ry="32" fill="rgba(240,192,64,0.04)"/>

    <!-- Screen top bar dots (macOS style) -->
    <circle cx="302" cy="305" r="9" fill="rgba(239,68,68,0.7)"/>
    <circle cx="332" cy="305" r="9" fill="rgba(249,115,22,0.7)"/>
    <circle cx="362" cy="305" r="9" fill="rgba(34,197,94,0.7)"/>
    <!-- Top bar line -->
    <line x1="262" y1="324" x2="750" y2="324" stroke="rgba(255,255,255,0.07)" stroke-width="1.5"/>

    <!-- ─── CONTENT LINES (study content) ─── -->
    <!-- Subject progress bars -->
    <!-- Line 1 label + bar -->
    <rect x="298" y="352" width="58" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="368" y="352" width="180" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect x="368" y="352" width="126" height="10" rx="5" fill="url(#blueAccent)" opacity="0.8"/>
    <text x="558" y="362" font-family="monospace" font-size="9" fill="rgba(96,165,250,0.8)">70%</text>

    <!-- Line 2 -->
    <rect x="298" y="378" width="58" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="368" y="378" width="180" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect x="368" y="378" width="90" height="10" rx="5" fill="url(#purpleAccent)" opacity="0.8"/>
    <text x="558" y="388" font-family="monospace" font-size="9" fill="rgba(192,132,252,0.8)">50%</text>

    <!-- Line 3 -->
    <rect x="298" y="404" width="58" height="10" rx="5" fill="rgba(255,255,255,0.15)"/>
    <rect x="368" y="404" width="180" height="10" rx="5" fill="rgba(255,255,255,0.06)"/>
    <rect x="368" y="404" width="162" height="10" rx="5" fill="rgba(34,197,94,0.7)"/>
    <text x="558" y="414" font-family="monospace" font-size="9" fill="rgba(74,222,128,0.8)">90%</text>

    <!-- Divider -->
    <line x1="298" y1="432" x2="720" y2="432" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>

    <!-- Mini chart bars -->
    <rect x="298" y="500" width="22" height="48" rx="4" fill="url(#goldRing)" opacity="0.3"/>
    <rect x="328" y="485" width="22" height="63" rx="4" fill="url(#goldRing)" opacity="0.5"/>
    <rect x="358" y="470" width="22" height="78" rx="4" fill="url(#goldRing)" opacity="0.65"/>
    <rect x="388" y="456" width="22" height="92" rx="4" fill="url(#goldRing)" opacity="0.8"/>
    <rect x="418" y="462" width="22" height="86" rx="4" fill="url(#goldRing)" opacity="0.9"/>
    <rect x="448" y="444" width="22" height="104" rx="4" fill="url(#gold)"/>
    <rect x="478" y="450" width="22" height="98" rx="4" fill="url(#gold)" opacity="0.85"/>

    <!-- Timer circle (right side of card) -->
    <circle cx="650" cy="498" r="58" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>
    <path d="M 650 440 A 58 58 0 1 1 592.1 527.9" fill="none" stroke="url(#goldRing)" stroke-width="6" stroke-linecap="round"/>
    <text x="650" y="491" font-family="monospace" font-size="18" font-weight="bold" fill="#f0c040" text-anchor="middle">25:00</text>
    <text x="650" y="510" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.4)" text-anchor="middle">FOCUS</text>

    <!-- ─── MAIN LOGO TEXT ─── -->
    <!-- "Study" text -->
    <text 
      x="512" y="742" 
      font-family="'Arial Black', 'Helvetica Neue', sans-serif" 
      font-weight="900" 
      font-size="108"
      letter-spacing="-4"
      fill="rgba(255,255,255,0.92)"
      text-anchor="middle"
      filter="url(#textGlow)"
    >Study</text>
    
    <!-- "OS" text with gold gradient -->
    <text 
      x="512" y="742" 
      font-family="'Arial Black', 'Helvetica Neue', sans-serif" 
      font-weight="900" 
      font-size="108"
      letter-spacing="-4"
      fill="url(#gold)"
      text-anchor="middle"
      filter="url(#shadow)"
    >      OS</text>

    <!-- Underline accent -->
    <rect x="340" y="756" width="344" height="4" rx="2" fill="url(#gold)" opacity="0.6"/>

    <!-- ─── CORNER ACCENT DOTS ─── -->
    <circle cx="88" cy="88" r="12" fill="rgba(240,192,64,0.15)"/>
    <circle cx="88" cy="88" r="5" fill="rgba(240,192,64,0.4)"/>
    <circle cx="936" cy="88" r="12" fill="rgba(96,165,250,0.15)"/>
    <circle cx="936" cy="88" r="5" fill="rgba(96,165,250,0.4)"/>
    <circle cx="88" cy="936" r="12" fill="rgba(192,132,252,0.15)"/>
    <circle cx="88" cy="936" r="5" fill="rgba(192,132,252,0.4)"/>
    <circle cx="936" cy="936" r="12" fill="rgba(240,192,64,0.15)"/>
    <circle cx="936" cy="936" r="5" fill="rgba(240,192,64,0.4)"/>

    <!-- ─── FLOATING PARTICLES ─── -->
    <circle cx="148" cy="340" r="3" fill="rgba(240,192,64,0.5)"/>
    <circle cx="880" cy="300" r="2.5" fill="rgba(96,165,250,0.4)"/>
    <circle cx="164" cy="700" r="2" fill="rgba(192,132,252,0.4)"/>
    <circle cx="876" cy="720" r="3" fill="rgba(240,192,64,0.35)"/>
    <circle cx="200" cy="512" r="2" fill="rgba(255,255,255,0.2)"/>
    <circle cx="824" cy="512" r="2" fill="rgba(255,255,255,0.2)"/>
    <circle cx="420" cy="198" r="2.5" fill="rgba(240,192,64,0.3)"/>
    <circle cx="620" cy="832" r="2.5" fill="rgba(96,165,250,0.3)"/>
  </g>
</svg>
