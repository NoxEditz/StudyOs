# Codemagic CI/CD configuration for StudyOS iOS build
workflows:
  ios-workflow:
    name: Build iOS App
    max_build_duration: 30
    environment:
      xcode: latest
      cocoapods: default
      node: latest
    
    scripts:
      - name: Install dependencies
        script: |
          npm install
      
      - name: Generate app icons from assets/icon.png
        script: |
          echo "Skipping icon generation due to @capacitor/assets compatibility issues."
          echo "Please generate icons locally using: npx @capacitor/assets generate --iconSrc ./assets/icon.png --platform ios"
          # npm install --save-dev @capacitor/assets@latest
          # sleep 2
          # node scripts/generate-icons.js
      
      - name: Prepare web files and sync Capacitor
        script: |
          npm run prepare:web
          npx cap sync ios
      
      - name: Build iOS app
        script: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $CM_BUILD_DIR/App.xcarchive \
            archive \
            -exportArchive \
            -exportPath $CM_BUILD_DIR/build \
            -exportOptionsPlist ios/App/exportOptions.plist \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE" \
            DEVELOPMENT_TEAM="$DEVELOPER_TEAM_ID"
    
    artifacts:
      - build/*.ipa
      - ios/App/App/AppIcon.appiconset/**
    
    publishing:
      email:
        recipients:
          - your-email@example.com
      slack:
        channel: "#builds"
