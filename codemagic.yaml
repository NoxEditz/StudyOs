workflows:

  # ═══════════════════════════════════════════════════════════════════════════
  # StudyOs — Sideloadly IPA Build
  #
  # HOW IT WORKS:
  #   1. Codemagic builds the app and produces an unsigned .ipa
  #   2. You download the .ipa from the Codemagic build artifacts page
  #   3. Open Sideloadly on your Windows PC
  #   4. Drag the .ipa into Sideloadly, log in with your free Apple ID
  #   5. Sideloadly signs it and installs directly to your iPhone via USB
  #
  # COST: $0 — Free Codemagic tier (500 min/month on M2), free Apple ID
  # NO certificates or provisioning profiles needed in Codemagic.
  # ═══════════════════════════════════════════════════════════════════════════

  ios-sideloadly-ipa:
    name: iOS IPA for Sideloadly
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      cocoapods: default
      vars:
        XCODE_WORKSPACE: "studyOs/StudyOs.xcworkspace"
        XCODE_SCHEME: "studyOs"
        OUTPUT_DIR: "$CM_BUILD_DIR/output"

    scripts:

      - name: Install CocoaPods dependencies
        script: |
          cd studyOs
          pod install --repo-update

      - name: Archive app (unsigned — Sideloadly will sign on your PC)
        script: |
          set -o pipefail
          mkdir -p "$OUTPUT_DIR"

          xcodebuild archive \
            -workspace "$XCODE_WORKSPACE" \
            -scheme "$XCODE_SCHEME" \
            -configuration Release \
            -archivePath "$OUTPUT_DIR/StudyOs.xcarchive" \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_STYLE=Manual \
            | xcpretty

      - name: Package into .ipa for Sideloadly
        script: |
          set -e
          PAYLOAD_DIR="$OUTPUT_DIR/Payload"
          mkdir -p "$PAYLOAD_DIR"

          # Find the .app inside the archive
          APP_PATH=$(find "$OUTPUT_DIR/StudyOs.xcarchive/Products/Applications" \
            -maxdepth 1 -name "*.app" | head -1)

          if [ -z "$APP_PATH" ]; then
            echo "ERROR: .app not found in archive. Check XCODE_SCHEME name above."
            exit 1
          fi

          echo "Found: $(basename $APP_PATH)"
          cp -r "$APP_PATH" "$PAYLOAD_DIR/"

          cd "$OUTPUT_DIR"
          zip -r StudyOs.ipa Payload
          rm -rf Payload
          echo "IPA ready. Download it from the Artifacts section below."

    artifacts:
      - $CM_BUILD_DIR/output/StudyOs.ipa

    publishing:
      email:
        recipients:
          - your@email.com          # ← put your email here
        notify:
          success: true
          failure: true
